<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Airport Shuttle Kalkulator</title>
    <!-- Tailwind CSS za dizajn -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel za prevođenje React koda u pregledniku -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- IKONE (prilagođene za rad u jednom fileu) ---
        const Truck = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>);
        const MapPin = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>);
        const Settings = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>);
        const Users = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>);
        const Info = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);
        const Briefcase = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>);

        function App() {
            const [ticketPrice, setTicketPrice] = useState(10);
            const [commissionPct, setCommissionPct] = useState(20);
            const [driverFee, setDriverFee] = useState(4);
            const [profitSplitA, setProfitSplitA] = useState(50);

            const [drivingPartner, setDrivingPartner] = useState('A');
            const [paxA, setPaxA] = useState(3);
            const [paxB, setPaxB] = useState(4);

            const handlePaxAChange = (val) => {
                const num = parseInt(val);
                if (num + paxB > 8) setPaxB(8 - num);
                setPaxA(num);
            };

            const handlePaxBChange = (val) => {
                const num = parseInt(val);
                if (paxA + num > 8) setPaxA(8 - num);
                setPaxB(num);
            };

            const totalPax = paxA + paxB;
            const totalRevenue = totalPax * ticketPrice;
            
            const commissionA = paxA * (ticketPrice * commissionPct / 100);
            const commissionB = paxB * (ticketPrice * commissionPct / 100);
            
            const totalDriverFee = totalPax * driverFee;
            
            const totalCosts = commissionA + commissionB + totalDriverFee;
            const jointProfit = totalRevenue - totalCosts;

            const profitA = jointProfit * (profitSplitA / 100);
            const profitB = jointProfit * (1 - (profitSplitA / 100));

            const totalPartnerA = commissionA + profitA + (drivingPartner === 'A' ? totalDriverFee : 0);
            const totalPartnerB = commissionB + profitB + (drivingPartner === 'B' ? totalDriverFee : 0);

            const singleCommission = ticketPrice * commissionPct / 100;
            const singleProfit = ticketPrice - singleCommission - driverFee;

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-2">
                                        <Truck className="text-blue-600" size={32} />
                                        Split Airport Shuttle - Kalkulator
                                    </h1>
                                    <p className="text-slate-500 mt-1">Interaktivni model raspodjele prihoda između dva partnera.</p>
                                </div>
                                <div className="flex gap-4 text-sm font-medium">
                                    <div className="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg border border-blue-100 flex items-center gap-2">
                                        <MapPin size={16} /> Partner A (1 kombi)
                                        <span className="block text-xs font-normal opacity-80">Stari Pazar</span>
                                    </div>
                                    <div className="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-lg border border-emerald-100 flex items-center gap-2">
                                        <MapPin size={16} /> Partner B (2 kombija)
                                        <span className="block text-xs font-normal opacity-80">Zvonimirova 5</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* Ljeva kolona: Globalni Parametri */}
                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                                        <Settings className="text-slate-500" />
                                        Globalni poslovni parametri
                                    </h2>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <label className="font-semibold text-sm">Cijena karte po putniku (€)</label>
                                                <span className="font-bold text-blue-600">{ticketPrice} €</span>
                                            </div>
                                            <input type="range" min="5" max="20" step="1" value={ticketPrice} onChange={(e) => setTicketPrice(Number(e.target.value))} className="w-full accent-blue-600" />
                                        </div>

                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <label className="font-semibold text-sm">Provizija agenciji/prodavaču (%)</label>
                                                <span className="font-bold text-blue-600">{commissionPct}% ({singleCommission.toFixed(2)} €)</span>
                                            </div>
                                            <input type="range" min="0" max="50" step="5" value={commissionPct} onChange={(e) => setCommissionPct(Number(e.target.value))} className="w-full accent-blue-600" />
                                        </div>

                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <label className="font-semibold text-sm">Naknada za vozilo po putniku (€)</label>
                                                <span className="font-bold text-blue-600">{driverFee.toFixed(2)} €</span>
                                            </div>
                                            <input type="range" min="1" max="10" step="0.5" value={driverFee} onChange={(e) => setDriverFee(Number(e.target.value))} className="w-full accent-blue-600" />
                                        </div>

                                        <div className="pt-4 border-t border-slate-100">
                                            <div className="flex justify-between mb-1">
                                                <label className="font-semibold text-sm">Podjela zajedničke dobiti (%)</label>
                                            </div>
                                            <div className="flex items-center gap-2 mb-2 text-sm">
                                                <span className="text-blue-700 font-bold w-16">A: {profitSplitA}%</span>
                                                <input type="range" min="0" max="100" step="5" value={profitSplitA} onChange={(e) => setProfitSplitA(Number(e.target.value))} className="flex-1 accent-slate-800" />
                                                <span className="text-emerald-700 font-bold w-16 text-right">B: {100 - profitSplitA}%</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 bg-slate-50 rounded-xl p-4 border border-slate-100">
                                        <h3 className="text-sm font-bold mb-3 text-center">Struktura jedne karte od {ticketPrice}€</h3>
                                        <div className="flex h-10 rounded-lg overflow-hidden text-xs font-bold text-white text-center shadow-inner">
                                            <div style={{ width: `${(singleCommission / ticketPrice) * 100}%` }} className="bg-amber-400 flex items-center justify-center px-1">
                                                {singleCommission > 1 && `${singleCommission.toFixed(1)}€ Prod`}
                                            </div>
                                            <div style={{ width: `${(driverFee / ticketPrice) * 100}%` }} className="bg-slate-500 flex items-center justify-center px-1">
                                                {driverFee > 1 && `${driverFee.toFixed(1)}€ Vozač`}
                                            </div>
                                            <div style={{ width: `${(singleProfit / ticketPrice) * 100}%` }} className="bg-blue-600 flex items-center justify-center px-1">
                                                {singleProfit > 1 && `${singleProfit.toFixed(1)}€ Dobit`}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-indigo-50 rounded-2xl p-6 border border-indigo-100">
                                    <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2">
                                        <Info size={18} /> Prijedlog dnevnog reda
                                    </h3>
                                    <ul className="text-sm space-y-1 text-indigo-700 font-medium">
                                        <li><span className="inline-block w-20">Iz Splita:</span> 06:30, 08:30, 10:30, 12:30, 15:00, 17:30, 19:30</li>
                                        <li><span className="inline-block w-20">Iz ZL Split:</span> 07:30, 09:30, 11:30, 13:30, 16:00, 18:30, 20:30</li>
                                    </ul>
                                </div>
                            </div>

                            {/* Desna kolona: Simulacija jedne vožnje */}
                            <div className="lg:col-span-7 space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                                        <Users className="text-blue-500" />
                                        Simulacija jedne vožnje
                                    </h2>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                            <label className="font-semibold text-sm block mb-3">Tko obavlja vožnju? (Kombi + Vozač)</label>
                                            <div className="flex gap-2">
                                                <button onClick={() => setDrivingPartner('A')} className={`flex-1 py-2 px-3 rounded-lg font-bold border transition-colors ${drivingPartner === 'A' ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>
                                                    Partner A
                                                </button>
                                                <button onClick={() => setDrivingPartner('B')} className={`flex-1 py-2 px-3 rounded-lg font-bold border transition-colors ${drivingPartner === 'B' ? 'bg-emerald-600 text-white border-emerald-600 shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>
                                                    Partner B
                                                </button>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                                            <label className="font-semibold text-sm block">Tko je prodao karte? (Kapacitet: {totalPax}/8)</label>
                                            <div>
                                                <div className="flex justify-between text-xs font-bold mb-1">
                                                    <span className="text-blue-700">A prodao: {paxA} putn.</span>
                                                </div>
                                                <input type="range" min="0" max="8" step="1" value={paxA} onChange={(e) => handlePaxAChange(e.target.value)} className="w-full accent-blue-600" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-xs font-bold mb-1">
                                                    <span className="text-emerald-700">B prodao: {paxB} putn.</span>
                                                </div>
                                                <input type="range" min="0" max="8" step="1" value={paxB} onChange={(e) => handlePaxBChange(e.target.value)} className="w-full accent-emerald-600" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 border-t border-slate-100 pt-6">
                                        <h3 className="text-lg font-bold mb-4 text-center text-slate-800">Financijski ishod ove vožnje</h3>
                                        <div className="bg-slate-900 text-white rounded-xl p-5 mb-6 text-center">
                                            <span className="block text-slate-400 text-sm mb-1">Ukupan prihod sakupljen od putnika</span>
                                            <span className="text-4xl font-black">{totalRevenue.toFixed(2)} €</span>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className={`p-5 rounded-xl border-2 transition-colors ${drivingPartner === 'A' ? 'border-blue-500 bg-blue-50' : 'border-slate-200 bg-white'}`}>
                                                <h4 className="font-bold text-blue-800 text-lg border-b border-slate-200 pb-2 mb-3 flex justify-between">
                                                    Partner A {drivingPartner === 'A' && <span className="bg-blue-500 text-white text-xs px-2 py-1 rounded flex items-center gap-1"><Truck size={12}/> Vozač</span>}
                                                </h4>
                                                <ul className="space-y-2 text-sm mb-4">
                                                    <li className="flex justify-between"><span className="text-slate-600">Provizija ({paxA} kart.)</span><span className="font-semibold">{commissionA.toFixed(2)} €</span></li>
                                                    {drivingPartner === 'A' && <li className="flex justify-between text-blue-700 font-medium"><span>Trošak vozila ({totalPax} putn.)</span><span>{totalDriverFee.toFixed(2)} €</span></li>}
                                                    <li className="flex justify-between text-slate-600"><span>Udio u dobiti ({profitSplitA}%)</span><span className="font-semibold">{profitA.toFixed(2)} €</span></li>
                                                </ul>
                                                <div className="pt-3 border-t border-slate-200 flex justify-between items-center">
                                                    <span className="font-bold">Ukupno:</span><span className="text-xl font-black text-blue-700">{totalPartnerA.toFixed(2)} €</span>
                                                </div>
                                            </div>

                                            <div className={`p-5 rounded-xl border-2 transition-colors ${drivingPartner === 'B' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 bg-white'}`}>
                                                <h4 className="font-bold text-emerald-800 text-lg border-b border-slate-200 pb-2 mb-3 flex justify-between">
                                                    Partner B {drivingPartner === 'B' && <span className="bg-emerald-500 text-white text-xs px-2 py-1 rounded flex items-center gap-1"><Truck size={12}/> Vozač</span>}
                                                </h4>
                                                <ul className="space-y-2 text-sm mb-4">
                                                    <li className="flex justify-between"><span className="text-slate-600">Provizija ({paxB} kart.)</span><span className="font-semibold">{commissionB.toFixed(2)} €</span></li>
                                                    {drivingPartner === 'B' && <li className="flex justify-between text-emerald-700 font-medium"><span>Trošak vozila ({totalPax} putn.)</span><span>{totalDriverFee.toFixed(2)} €</span></li>}
                                                    <li className="flex justify-between text-slate-600"><span>Udio u dobiti ({100 - profitSplitA}%)</span><span className="font-semibold">{profitB.toFixed(2)} €</span></li>
                                                </ul>
                                                <div className="pt-3 border-t border-slate-200 flex justify-between items-center">
                                                    <span className="font-bold">Ukupno:</span><span className="text-xl font-black text-emerald-700">{totalPartnerB.toFixed(2)} €</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-4 flex justify-between items-center text-sm bg-slate-100 px-4 py-3 rounded-lg text-slate-600">
                                            <span>Generirana zajednička čista dobit (Fond):</span>
                                            <span className="font-bold text-slate-800 text-base">{jointProfit.toFixed(2)} €</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex items-start gap-4">
                                    <div className="bg-blue-100 text-blue-600 p-3 rounded-full shrink-0">
                                        <Briefcase size={24} />
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-slate-800 mb-1">Kako ovo funkcionira u praksi?</h3>
                                        <p className="text-sm text-slate-600">
                                            Na kraju svakog dana, svaki partner zadržava novac od karata koje je prodao. Zatim se na temelju evidencije vožnji radi obračun, te jedan partner isplaćuje razliku drugome prema ovom izračunu.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
